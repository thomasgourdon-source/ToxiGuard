:root{--bg:#f5f5f5;--card:#fff;--accent:#e94560;--sec:#eef2f7;--txt:#1a1a2e;--border:#dde3ea;--green:#2b8a3e;--yellow:#e67700;--orange:#d9480f;--blue:#1864ab;--purple:#862e9c;--teal:#0b7285;--r:16px;--header-bg:#1a3a5c;--header-txt:#f5f5f5;--nav-bg:#eef2f7;--nav-active:#1a3a5c;--nav-active-txt:#fff;--badge-bg:#e0e7ef;--modal-bg:#fff;--modal-txt:#1a1a2e;--input-bg:#fff;--input-border:#c4cdd8;--shadow:0 2px 12px rgba(0,0,0,.06);--cat-bg:#e0e7ef;--cat-active:#1a3a5c;--cat-active-txt:#fff;--sel-bg:#1a3a5c;--sel-txt:#fff;--tool-bg:#f8fafc;--tool-border:#dde3ea;--grave-bg:#fde8e8;--grave-txt:#c92a2a;--toggle-bg:#d0d8e0;--gap:20px;--card-pad:24px}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .3s,color .3s;line-height:1.6}
#app{max-width:1200px;margin:0 auto;padding:0 24px 140px}
header{background:var(--header-bg);color:var(--header-txt);padding:24px 32px;border-radius:0 0 var(--r) var(--r);display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:24px;position:relative}
.logo-area{display:flex;align-items:center;gap:16px}

.logo-light,.logo-dark{display:none}

[data-theme="dark"] .logo-light{display:none} [data-theme="dark"] .logo-dark{display:block}
.header-controls{display:flex;align-items:center;gap:14px}
.theme-toggle{background:var(--toggle-bg);border:none;border-radius:24px;padding:10px 16px;cursor:pointer;font-size:1.15rem;color:var(--header-txt);display:flex;align-items:center;gap:8px;transition:background .3s}

#cats button.active{background:var(--cat-active);color:var(--cat-active-txt);border-color:var(--cat-active)}

.int-critique{background:var(--grave-bg);border-left:4px solid var(--accent)}

.patient-view{margin-top:20px}

.patient-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.timeline-phase{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px;box-shadow:var(--shadow)}
.timeline-phase h4{margin-bottom:12px;display:flex;align-items:center;gap:12px;font-size:1.02rem}
.timeline-dot{width:16px;height:16px;border-radius:50%;display:inline-block}
.rapid-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px;box-shadow:var(--shadow)}
.rapid-section h4{color:var(--blue);margin-bottom:12px}
.rapid-section li{margin-bottom:6px;font-size:.9rem;line-height:1.6}
.glasgow-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.glasgow-btn{padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--cat-bg);color:var(--txt);cursor:pointer;font-size:.82rem;transition:all .2s;flex:1;text-align:center;min-width:0}
.glasgow-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.glasgow-total{font-size:2.4rem;font-weight:700;color:var(--accent);text-align:center;margin:20px 0}
.pss-organ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:14px}
.pss-organ-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all .25s}
.pss-organ-card:hover{border-color:var(--accent)}
.pss-organ-card.selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,69,96,.15)}
.pss-organ-card h5{margin-bottom:8px;font-size:.9rem}
.pss-score-display{font-size:2rem;font-weight:700;margin:8px 0}
.tools-menu{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.tool-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;text-align:center;transition:all .25s;box-shadow:var(--shadow)}
.tool-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 6px 20px rgba(233,69,96,.1)}
.tool-card.active{border-color:var(--accent);background:var(--sec)}
.tool-card .tool-icon{font-size:2rem;margin-bottom:10px}
.tool-card .tool-name{font-size:.88rem;font-weight:600}
.tool-back{background:none;border:1px solid var(--border);color:var(--txt);padding:10px 20px;border-radius:12px;cursor:pointer;font-size:.88rem;margin-bottom:20px;transition:all .2s}
.tool-back:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:600px){
 header{flex-direction:column;text-align:center;padding:20px}
 .grid{grid-template-columns:1fr}
 .pk-grid{grid-template-columns:1fr}
 #toolbar{flex-direction:column}
 nav#tabs{flex-wrap:wrap}
 nav#tabs button{flex:0 0 auto}
 .pss-organ-grid{grid-template-columns:1fr 1fr}
 .tools-menu{grid-template-columns:1fr 1fr}
 #app{padding:0 14px 120px}
}

<script>

function getPreferredTheme(){const s=localStorage.getItem('tg-theme');if(s)return s;return window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}

{id:"paracetamol",name:"Paracétamol",aliases:["Doliprane","Efferalgan","Dafalgan","acétaminophène","APAP"],class:"Antalgique",category:"Médicaments",toxidrome:[],

</div>

function addTimeline(){
const time=document.getElementById('tlTime')?.value;
const event=document.getElementById('tlEvent')?.value;
if(time&&event){patientData.timeline.push({time,event});renderPatient()}
}

function computePatient(){
const el=document.getElementById('calcValues');if(!el)return;
let html='';
const na=parseFloat(patientData.na),cl=parseFloat(patientData.cl),hco3=parseFloat(patientData.hco3),k=parseFloat(patientData.k),ph=parseFloat(patientData.ph),glyc=parseFloat(patientData.glyc);
if(na&&cl&&hco3){const ta=na-cl-hco3;html+=`<p><strong>Trou anionique:</strong> ${ta.toFixed(1)} mmol/L ${ta>16?'⚠️ Élevé':ta<8?'⚠️ Bas':'✓ Normal'}</p>`}
if(na&&glyc){const nac=na+1.6*(glyc-1);html+=`<p><strong>Na⁺ corrigée:</strong> ${nac.toFixed(1)} mmol/L</p>`}
if(k&&ph){const kc=k+0.6*(7.40-ph);html+=`<p><strong>K⁺ corrigée:</strong> ${kc.toFixed(1)} mmol/L</p>`}
if(patientData.age&&patientData.poids&&patientData.creat){
const age=parseFloat(patientData.age),w=parseFloat(patientData.poids),cr=parseFloat(patientData.creat);
const cg=((140-age)*w)/(0.814*cr)*(patientData.sexe==='F'?0.85:1);
html+=`<p><strong>Cockroft-Gault:</strong> ${cg.toFixed(1)} mL/min</p>`;
}
el.innerHTML=html||'<p style="color:var(--dim)">Renseignez les données ci-dessus puis cliquez Calculer</p>';
}

let html=`<h4>🧠 Score de Glasgow (GCS): <span style="color:var(--accent);font-size:1.4rem">${total}/15</span></h4><p>${interp}</p>`;

let pssState={neuro:0,cardio:0,respi:0,dig:0,renal:0,hepat:0,hemato:0,metab:0};
function renderPSS(){
const organs=[
{key:'neuro',label:'Neurologique',levels:['Normal','Somnolence, ataxie','Coma réactif, convulsions brèves','Coma aréactif, EME, œdème cérébral']},
{key:'cardio',label:'Cardiovasculaire',levels:['Normal','Troubles mineurs isolés','Hypotension, bradycardie symptomatique','Choc, arythmie sévère, ACR']},
{key:'respi',label:'Respiratoire',levels:['Normal','Toux, bronchospasme léger','Dyspnée, hypoxémie','SDRA, insuffisance respiratoire, intubation']},
{key:'dig',label:'Digestif',levels:['Normal','Nausées, vomissements','Hémorragie digestive modérée','Hémorragie massive, perforation']},
{key:'renal',label:'Rénal',levels:['Normal','Protéinurie, hématurie','IRA oligurique, créat 2-5×N','IRA anurique, dialyse']},
{key:'hepat',label:'Hépatique',levels:['Normal','Cytolyse modérée (<5N)','Cytolyse majeure (5-50N)','IHC, encéphalopathie hépatique']},
{key:'hemato',label:'Hématologique',levels:['Normal','Troubles mineurs','Coagulopathie, anémie significative','CIVD, hémorragie menaçante']},
{key:'metab',label:'Métabolique',levels:['Normal','Troubles acido-basiques légers','Acidose/alcalose sévère, dysnatrémie','Acidose réfractaire, hyperkaliémie menaçante']}
];
const maxPSS=Math.max(...Object.values(pssState));
let interp='';if(maxPSS===0)interp='Aucune toxicité';else if(maxPSS===1)interp='Toxicité mineure';else if(maxPSS===2)interp='Toxicité modérée';else interp='⚠️ Toxicité sévère';
let html=`<h4>📊 PSS (Poisoning Severity Score): <span style="color:var(--accent);font-size:1.2rem">Grade ${maxPSS} — ${interp}</span></h4>`;
organs.forEach(o=>{
html+=`<div style="margin:12px 0;padding:12px;background:var(--sec);border-radius:12px;cursor:pointer" onclick="pssState.${o.key}=(pssState.${o.key}+1)%4;renderTools()">
<div style="display:flex;justify-content:space-between;align-items:center">
<strong>${o.label}</strong><span class="class-badge" style="background:${pssState[o.key]===0?'#2b8a3e':pssState[o.key]===1?'#f08c00':pssState[o.key]===2?'#e8590c':'#c92a2a'};color:white">${pssState[o.key]}</span>
</div><p style="font-size:.82rem;color:var(--dim);margin:6px 0 0">${o.levels[pssState[o.key]]}</p></div>`;
});
html+=`<button class="tool-back" onclick="pssState={neuro:0,cardio:0,respi:0,dig:0,renal:0,hepat:0,hemato:0,metab:0};renderTools()" style="margin-top:12px">Réinitialiser</button>`;
return html;
}

// --- RUMACK-MATTHEW ---
let rumackData={ingestionTime:'',dosageTime:'',concentration:'',unit:'ug_mL'};
function renderRumack(){
let html=`<h4>📈 Nomogramme de Rumack-Matthew (Paracétamol)</h4>
<p style="font-size:.85rem;color:var(--dim)">Interpréter la concentration plasmatique de paracétamol en fonction du délai post-ingestion (4-24h). Zone au-dessus de la ligne = traitement NAC indiqué.</p>
<div class="detail-grid" style="grid-template-columns:1fr 1fr;gap:16px">
<div><label style="font-size:.85rem;font-weight:600">Heure d'ingestion estimée</label><input type="datetime-local" id="rumackIngestion" value="${rumackData.ingestionTime}" onchange="rumackData.ingestionTime=this.value;updateRumackDelta()" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">Heure du dosage</label><input type="datetime-local" id="rumackDosage" value="${rumackData.dosageTime}" onchange="rumackData.dosageTime=this.value;updateRumackDelta()" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">Concentration mesurée</label><input type="number" id="rumackConc" step="any" value="${rumackData.concentration}" onchange="rumackData.concentration=this.value;drawRumackCanvas()" placeholder="Valeur" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">Unité</label><select id="rumackUnit" onchange="rumackData.unit=this.value;drawRumackCanvas()" style="width:100%;margin-top:6px">
<option value="ug_mL"${rumackData.unit==='ug_mL'?' selected':''}>µg/mL</option>
<option value="umol_L"${rumackData.unit==='umol_L'?' selected':''}>µmol/L</option>
<option value="mg_L"${rumackData.unit==='mg_L'?' selected':''}>mg/L</option>
</select></div>
</div>
<div id="rumackDelta" style="margin:12px 0;padding:12px;background:var(--sec);border-radius:12px;font-weight:600;text-align:center"></div>
<div id="rumackResult" style="margin:12px 0;padding:12px;background:var(--sec);border-radius:12px;text-align:center;display:none"></div>
<div class="canvas-wrap" style="margin:16px 0;overflow-x:auto"><canvas id="rumackCanvas" width="700" height="450" style="width:100%;max-width:700px;height:auto"></canvas></div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button class="tool-back" onclick="rumackData={ingestionTime:'',dosageTime:'',concentration:'',unit:'ug_mL'};renderTools()">Réinitialiser</button>
<div style="font-size:.78rem;color:var(--dim);display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:14px;height:14px;background:#e0383833;border:2px solid #e03838;border-radius:3px"></span>Toxique <span style="display:inline-block;width:14px;height:14px;background:#f0860033;border:2px solid #f08600;border-radius:3px"></span>Possible <span style="display:inline-block;width:14px;height:14px;background:#2b8a3e33;border:2px solid #2b8a3e;border-radius:3px"></span>Non toxique</div>
</div>`;
return html;
}
function updateRumackDelta(){
const el=document.getElementById('rumackDelta');if(!el)return;
if(rumackData.ingestionTime&&rumackData.dosageTime){
const d=(new Date(rumackData.dosageTime)-new Date(rumackData.ingestionTime))/3600000;
if(d<0)el.innerHTML='⚠️ L\'heure de dosage est antérieure à l\'ingestion';
else if(d<4)el.innerHTML=`⏱ Δt = ${d.toFixed(1)}h — <span style="color:#f08c00">Dosage trop précoce (<4h), à recontrôler</span>`;
else if(d>24)el.innerHTML=`⏱ Δt = ${d.toFixed(1)}h — <span style="color:#e03131">Hors nomogramme (>24h)</span>`;
else el.innerHTML=`⏱ Δt = ${d.toFixed(1)}h post-ingestion`;
}else el.innerHTML='Renseignez les deux horaires pour calculer le delta';
drawRumackCanvas();
}
function drawRumackCanvas(){
const canvas=document.getElementById('rumackCanvas');if(!canvas)return;
const ctx=canvas.getContext('2d');
const W=700,H=450;canvas.width=W;canvas.height=H;
const isDark=document.documentElement.getAttribute('data-theme')==='dark';
const txtColor=isDark?'#c1c2c5':'#343a40';
const gridColor=isDark?'#373A40':'#dee2e6';
const bgColor=isDark?'#1a1b1e':'#ffffff';
ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H);
const ml=80,mr=30,mt=30,mb=60;
const pw=W-ml-mr,ph=H-mt-mb;
const minH=4,maxH=24,minC=1,maxC=1000;
const logMin=Math.log10(minC),logMax=Math.log10(maxC);
function xPos(h){return ml+((h-minH)/(maxH-minH))*pw}
function yPos(c){return mt+((logMax-Math.log10(c))/(logMax-logMin))*ph}
// grid
ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;
[1,2,5,10,20,50,100,200,500,1000].forEach(c=>{
if(c>=minC&&c<=maxC){const y=yPos(c);ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(W-mr,y);ctx.stroke();
ctx.fillStyle=txtColor;ctx.font='11px system-ui';ctx.textAlign='right';ctx.fillText(c,ml-8,y+4)}});
for(let h=4;h<=24;h+=2){const x=xPos(h);ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,H-mb);ctx.stroke();
ctx.fillStyle=txtColor;ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText(h+'h',x,H-mb+18)}
// axes labels
ctx.fillStyle=txtColor;ctx.font='bold 12px system-ui';
ctx.textAlign='center';ctx.fillText('Heures post-ingestion',ml+pw/2,H-10);
ctx.save();ctx.translate(16,mt+ph/2);ctx.rotate(-Math.PI/2);ctx.fillText('Concentration (µg/mL)',0,0);ctx.restore();
// treatment lines — Rumack (200 line) and probable toxicity (150 line)
const line200=[{h:4,c:200},{h:12,c:50},{h:24,c:6.25}];
const line150=[{h:4,c:150},{h:12,c:37.5},{h:24,c:4.7}];
// zone fills
ctx.fillStyle='#e0383818';ctx.beginPath();ctx.moveTo(xPos(4),mt);ctx.lineTo(xPos(24),mt);ctx.lineTo(xPos(24),yPos(line200[2].c));
ctx.lineTo(xPos(12),yPos(line200[1].c));ctx.lineTo(xPos(4),yPos(line200[0].c));ctx.closePath();ctx.fill();
ctx.fillStyle='#f0860018';ctx.beginPath();ctx.moveTo(xPos(4),yPos(line200[0].c));ctx.lineTo(xPos(12),yPos(line200[1].c));ctx.lineTo(xPos(24),yPos(line200[2].c));
ctx.lineTo(xPos(24),yPos(line150[2].c));ctx.lineTo(xPos(12),yPos(line150[1].c));ctx.lineTo(xPos(4),yPos(line150[0].c));ctx.closePath();ctx.fill();
ctx.fillStyle='#2b8a3e18';ctx.beginPath();ctx.moveTo(xPos(4),yPos(line150[0].c));ctx.lineTo(xPos(12),yPos(line150[1].c));ctx.lineTo(xPos(24),yPos(line150[2].c));
ctx.lineTo(xPos(24),H-mb);ctx.lineTo(xPos(4),H-mb);ctx.closePath();ctx.fill();
// lines
function drawLine(pts,color){ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();pts.forEach((p,i)=>{const x=xPos(p.h),y=yPos(p.c);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke()}
drawLine(line200,'#e03838');drawLine(line150,'#f08600');
// legend box
const lx=W-mr-180,ly=mt+8;
ctx.fillStyle=isDark?'#25262bdd':'#ffffffdd';ctx.fillRect(lx,ly,170,70);ctx.strokeStyle=gridColor;ctx.strokeRect(lx,ly,170,70);
ctx.font='bold 11px system-ui';ctx.fillStyle=txtColor;ctx.textAlign='left';ctx.fillText('Légende',lx+8,ly+16);
ctx.strokeStyle='#e03838';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(lx+8,ly+32);ctx.lineTo(lx+35,ly+32);ctx.stroke();
ctx.fillStyle=txtColor;ctx.font='11px system-ui';ctx.fillText('Toxicité probable (200)',lx+42,ly+36);
ctx.strokeStyle='#f08600';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(lx+8,ly+52);ctx.lineTo(lx+35,ly+52);ctx.stroke();
ctx.fillText('Toxicité possible (150)',lx+42,ly+56);
// patient point
if(rumackData.ingestionTime&&rumackData.dosageTime&&rumackData.concentration){
const deltaH=(new Date(rumackData.dosageTime)-new Date(rumackData.ingestionTime))/3600000;
let concUgMl=parseFloat(rumackData.concentration);
if(rumackData.unit==='umol_L')concUgMl=concUgMl/6.614;
if(rumackData.unit==='mg_L')concUgMl=concUgMl;
if(deltaH>=4&&deltaH<=24&&concUgMl>=minC&&concUgMl<=maxC){
const px=xPos(deltaH),py=yPos(concUgMl);
// halo
ctx.beginPath();ctx.arc(px,py,14,0,2*Math.PI);ctx.fillStyle=isDark?'rgba(76,110,245,0.25)':'rgba(76,110,245,0.2)';ctx.fill();
// dot
ctx.beginPath();ctx.arc(px,py,7,0,2*Math.PI);ctx.fillStyle='#4c6ef5';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
// label
ctx.fillStyle=txtColor;ctx.font='bold 11px system-ui';ctx.textAlign='left';ctx.fillText(`${concUgMl.toFixed(1)} µg/mL @ ${deltaH.toFixed(1)}h`,px+14,py-4);
// interpretation
const c200At=200*Math.pow(6.25/200,(deltaH-4)/20);
const c150At=150*Math.pow(4.7/150,(deltaH-4)/20);
const res=document.getElementById('rumackResult');
if(res){res.style.display='block';
if(concUgMl>=c200At)res.innerHTML=`<span style="color:#e03131;font-weight:700">⚠️ ZONE TOXIQUE — NAC indiqué</span><br><small>Concentration au-dessus de la ligne 200 (${c200At.toFixed(1)} µg/mL à ${deltaH.toFixed(1)}h)</small>`;
else if(concUgMl>=c150At)res.innerHTML=`<span style="color:#f08c00;font-weight:700">⚠ TOXICITÉ POSSIBLE — NAC à considérer</span><br><small>Concentration entre les lignes 150-200</small>`;
else res.innerHTML=`<span style="color:#2b8a3e;font-weight:700">✓ Zone non toxique</span><br><small>Concentration sous la ligne 150 (${c150At.toFixed(1)} µg/mL à ${deltaH.toFixed(1)}h)</small>`}
}
}
}

function renderRenal(){
return `<h4>🫘 Clairance rénale</h4>
<div class="detail-grid" style="grid-template-columns:1fr 1fr;gap:16px">
<div><label style="font-size:.85rem;font-weight:600">Âge</label><input type="number" id="renalAge" placeholder="ans" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">Poids (kg)</label><input type="number" id="renalPoids" placeholder="kg" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">Créatinine (µmol/L)</label><input type="number" id="renalCreat" placeholder="µmol/L" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">Sexe</label><select id="renalSexe" style="width:100%;margin-top:6px"><option value="M">Homme</option><option value="F">Femme</option></select></div>
<div><label style="font-size:.85rem;font-weight:600">Ethnie noire</label><select id="renalEthnie" style="width:100%;margin-top:6px"><option value="non">Non</option><option value="oui">Oui</option></select></div>
</div>
<button class="tool-back" onclick="calcRenal()" style="margin-top:16px">Calculer</button>
<div id="renalResult" style="margin-top:16px"></div>`;
}
function calcRenal(){
const age=parseFloat(document.getElementById('renalAge')?.value),poids=parseFloat(document.getElementById('renalPoids')?.value),creat=parseFloat(document.getElementById('renalCreat')?.value);
const sexe=document.getElementById('renalSexe')?.value,ethnie=document.getElementById('renalEthnie')?.value;
const el=document.getElementById('renalResult');if(!el)return;
if(!age||!poids||!creat){el.innerHTML='<p style="color:#e03131">Veuillez remplir tous les champs</p>';return}
const cg=((140-age)*poids)/(0.814*creat)*(sexe==='F'?0.85:1);
const creatMg=creat/88.4;
let ckd;
if(sexe==='F'){ckd=144*Math.pow(Math.min(creatMg/0.7,1),-0.329)*Math.pow(Math.max(creatMg/0.7,1),-1.209)*Math.pow(0.9938,age)*(ethnie==='oui'?1.159:1)}
else{ckd=141*Math.pow(Math.min(creatMg/0.9,1),-0.411)*Math.pow(Math.max(creatMg/0.9,1),-1.209)*Math.pow(0.9938,age)*(ethnie==='oui'?1.159:1)}
let html=`<div class="detail-grid" style="grid-template-columns:1fr 1fr"><div class="detail-section"><h4>Cockcroft-Gault</h4><p style="font-size:1.3rem;font-weight:700;color:var(--accent)">${cg.toFixed(1)} mL/min</p>`;
if(cg>=90)html+='<p style="color:#2b8a3e">✓ Fonction rénale normale</p>';else if(cg>=60)html+='<p style="color:#f08c00">IRC légère</p>';else if(cg>=30)html+='<p style="color:#e8590c">IRC modérée</p>';else if(cg>=15)html+='<p style="color:#e03131">IRC sévère</p>';else html+='<p style="color:#c92a2a">⚠️ IRC terminale</p>';
html+=`</div><div class="detail-section"><h4>CKD-EPI (2009)</h4><p style="font-size:1.3rem;font-weight:700;color:var(--accent)">${ckd.toFixed(1)} mL/min/1.73m²</p>`;
if(ckd>=90)html+='<p style="color:#2b8a3e">✓ G1 — Normal</p>';else if(ckd>=60)html+='<p style="color:#f08c00">G2 — Légèrement diminué</p>';else if(ckd>=45)html+='<p style="color:#e8590c">G3a — Modérément diminué</p>';else if(ckd>=30)html+='<p style="color:#e8590c">G3b — Modérément à sévèrement diminué</p>';else if(ckd>=15)html+='<p style="color:#e03131">G4 — Sévèrement diminué</p>';else html+='<p style="color:#c92a2a">G5 — Insuffisance rénale</p>';
html+=`</div></div>`;el.innerHTML=html;
}

function calcNatremie(){

}

// --- KALEMIE CORRIGEE ---
function renderKalemie(){
return `<h4>⚡ Kaliémie corrigée (pH)</h4>
<p style="font-size:.85rem;color:var(--dim)">K⁺ corr = K⁺ mesurée + 0.6 × (7.40 − pH)<br>Corrige le transfert intra/extracellulaire du potassium lié au pH.</p>
<div class="detail-grid" style="grid-template-columns:1fr 1fr;gap:16px">
<div><label style="font-size:.85rem;font-weight:600">K⁺ mesurée (mmol/L)</label><input type="number" id="kVal" step="any" placeholder="mmol/L" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">pH artériel</label><input type="number" id="kPH" step="any" placeholder="7.40" style="width:100%;margin-top:6px"></div>
</div>
<button class="tool-back" onclick="calcKalemie()" style="margin-top:16px">Calculer</button>
<div id="kResult" style="margin-top:16px"></div>`;
}
function calcKalemie(){
const k=parseFloat(document.getElementById('kVal')?.value),ph=parseFloat(document.getElementById('kPH')?.value);
const el=document.getElementById('kResult');if(!el)return;
if(!k||!ph){el.innerHTML='<p style="color:#e03131">Remplir tous les champs</p>';return}
const corr=k+0.6*(7.40-ph);
let interp='';if(corr<3.5)interp='⚠️ Hypokaliémie';else if(corr>5.0)interp='⚠️ Hyperkaliémie';else interp='✓ Normal';
const corrVal=(0.6*(7.40-ph));const corrSign=corrVal>0?"+":"";el.innerHTML=`<div class="detail-section"><p style="font-size:1.3rem;font-weight:700;color:var(--accent)">` +corr.toFixed(2)+ ` mmol/L</p><p>` +interp+ `</p><p style="font-size:.82rem;color:var(--dim)">Correction: ` +corrSign+corrVal.toFixed(2)+ ` mmol/L pour pH ` +ph+ `</p></div>`;
}

function calcOsmPlasma(){
const na=parseFloat(document.getElementById('osmNa')?.value),glyc=parseFloat(document.getElementById('osmGlyc')?.value),uree=parseFloat(document.getElementById('osmUree')?.value);
const el=document.getElementById('osmPlasmaResult');if(!el)return;
if(!na){el.innerHTML='<p style="color:#e03131">Na⁺ requis</p>';return}
const osm=2*na+(glyc?glyc/0.18:0)+(uree?uree/0.06:0);
const trou=osm-(2*na+(glyc?glyc/0.18:0)+(uree?uree/0.06:0));
let interp='';if(osm<280)interp='⚠️ Hypo-osmolaire';else if(osm>300)interp='⚠️ Hyperosmolaire';else interp='✓ Normal (280-300)';
el.innerHTML=`<div class="detail-section"><p style="font-size:1.3rem;font-weight:700;color:var(--accent)">${osm.toFixed(0)} mOsm/L</p><p>${interp}</p></div>`;
}
function calcOsmUrine(){
const naU=parseFloat(document.getElementById('osmNaU')?.value)||0,kU=parseFloat(document.getElementById('osmKU')?.value)||0;
const ureeU=parseFloat(document.getElementById('osmUreeU')?.value)||0,glucU=parseFloat(document.getElementById('osmGlucU')?.value)||0;
const el=document.getElementById('osmUrineResult');if(!el)return;
const osm=2*(naU+kU)+(ureeU/0.06)+(glucU/0.18);
el.innerHTML=`<div class="detail-section"><p style="font-size:1.3rem;font-weight:700;color:var(--accent)">${osm.toFixed(0)} mOsm/L</p><p>${osm<100?'Urines diluées':osm>800?'Urines très concentrées':'Urines concentrées'}</p></div>`;
}

function renderTrouAnionique(){
return `<h4>⚖️ Trou anionique</h4>
<div style="margin-bottom:20px"><h5>Trou anionique sanguin</h5>
<p style="font-size:.85rem;color:var(--dim)">TA = Na⁺ − Cl⁻ − HCO₃⁻ (normale 8-16 mmol/L, ou 12±4 avec K⁺)</p>
<div class="detail-grid" style="grid-template-columns:1fr 1fr 1fr;gap:12px">
<div><label style="font-size:.85rem;font-weight:600">Na⁺ (mmol/L)</label><input type="number" id="taNa" step="any" style="width:100%;margin-top:6px"></div>

</div>
<div class="detail-grid" style="grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
<div><label style="font-size:.85rem;font-weight:600">Albumine (g/L) — optionnel</label><input type="number" id="taAlb" step="any" placeholder="40" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">Lactates (mmol/L) — optionnel</label><input type="number" id="taLact" step="any" style="width:100%;margin-top:6px"></div>
</div>
<button class="tool-back" onclick="calcTASang()" style="margin-top:12px">Calculer TA sanguin</button>
<div id="taSangResult" style="margin-top:12px"></div>
</div>
<div><h5>Trou anionique urinaire</h5>
<p style="font-size:.85rem;color:var(--dim)">TA urinaire = Na⁺ᵤ + K⁺ᵤ − Cl⁻ᵤ (évalue l'ammoniurie)</p>
<div class="detail-grid" style="grid-template-columns:1fr 1fr 1fr;gap:12px">
<div><label style="font-size:.85rem;font-weight:600">Na⁺ᵤ (mmol/L)</label><input type="number" id="taUNa" step="any" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">K⁺ᵤ (mmol/L)</label><input type="number" id="taUK" step="any" style="width:100%;margin-top:6px"></div>
<div><label style="font-size:.85rem;font-weight:600">Cl⁻ᵤ (mmol/L)</label><input type="number" id="taUCl" step="any" style="width:100%;margin-top:6px"></div>
</div>
<button class="tool-back" onclick="calcTAUrine()" style="margin-top:12px">Calculer TA urinaire</button>
<div id="taUrineResult" style="margin-top:12px"></div>
</div>`;

function calcTASang(){
const na=parseFloat(document.getElementById('taNa')?.value),cl=parseFloat(document.getElementById('taCl')?.value),hco3=parseFloat(document.getElementById('taHCO3')?.value);
const alb=parseFloat(document.getElementById('taAlb')?.value)||40,lact=parseFloat(document.getElementById('taLact')?.value)||0;
const el=document.getElementById('taSangResult');if(!el)return;
if(!na||!cl||!hco3){el.innerHTML='<p style="color:#e03131">Na⁺, Cl⁻ et HCO₃⁻ requis</p>';return}
const ta=na-cl-hco3;
const taCorr=ta+2.5*(4-alb/10);
let html=`<div class="detail-section"><p style="font-size:1.3rem;font-weight:700;color:var(--accent)">TA = ${ta.toFixed(1)} mmol/L</p>`;
if(alb!==40)html+=`<p>TA corrigé (albumine): ${taCorr.toFixed(1)} mmol/L</p>`;
const effectiveTA=alb!==40?taCorr:ta;
if(effectiveTA>16){
html+=`<p style="color:#e03131;font-weight:600">⚠️ Trou anionique élevé — acidose métabolique à TA augmenté</p>`;
html+=`<div style="margin-top:12px;padding:12px;background:var(--bg);border-radius:8px"><strong>Orientation étiologique (MUDPILES):</strong><br>
• <strong>M</strong>éthanol<br>• <strong>U</strong>rémie<br>• <strong>D</strong>iabète (acidocétose)<br>• <strong>P</strong>ropylène glycol / <strong>P</strong>aracétamol<br>• <strong>I</strong>soniazide / <strong>I</strong>ron (fer)<br>• <strong>L</strong>actates${lact?` (${lact} mmol/L${lact>2?' ⚠️':''})`:''}
<br>• <strong>E</strong>thylène glycol<br>• <strong>S</strong>alicylés</div>`;
}else if(effectiveTA<8){
html+=`<p style="color:#f08c00">TA bas — évoquer hypoalbuminémie, intoxication au lithium ou bromures</p>`;
}else html+=`<p style="color:#2b8a3e">✓ Normal</p>`;
html+=`</div>`;el.innerHTML=html;
}
function calcTAUrine(){
const naU=parseFloat(document.getElementById('taUNa')?.value),kU=parseFloat(document.getElementById('taUK')?.value),clU=parseFloat(document.getElementById('taUCl')?.value);
const el=document.getElementById('taUrineResult');if(!el)return;
if(!naU||!kU||!clU){el.innerHTML='<p style="color:#e03131">Tous les champs sont requis</p>';return}
const tau=naU+kU-clU;
let html=`<div class="detail-section"><p style="font-size:1.3rem;font-weight:700;color:var(--accent)">TA urinaire = ${tau.toFixed(1)} mmol/L</p>`;
if(tau<0)html+=`<p style="color:#2b8a3e">✓ Négatif — réponse rénale appropriée (ammoniurie conservée). Oriente vers une perte digestive de bicarbonates (diarrhée).</p>`;
else html+=`<p style="color:#e03131">⚠️ Positif — défaut d'ammoniurie. Oriente vers une acidose tubulaire rénale.</p>`;
html+=`</div>`;el.innerHTML=html;
}

function renderPrescott(){
return `<h4>🏥 Critères pronostiques hépatiques</h4>
<div style="margin-bottom:24px;padding:16px;background:var(--sec);border-radius:12px">
<h5 style="margin:0 0 12px">Score de Prescott (Paracétamol)</h5>
<p style="font-size:.85rem;color:var(--dim)">Évalue la gravité de l'hépatite au paracétamol et l'indication de transplantation.</p>
<div class="detail-grid" style="grid-template-columns:1fr 1fr 1fr;gap:12px">

<div><label style="font-size:.85rem;font-weight:600">Lactates (mmol/L)</label><input type="number" id="prescottLact" step="any" style="width:100%;margin-top:6px"></div>
</div>

</div>

<div class="detail-grid" style="grid-template-columns:1fr 1fr 1fr;gap:12px">

<div id="clichyResult" style="margin-top:12px"></div>
</div>`;
}
function calcPrescott(){
const ph=parseFloat(document.getElementById('prescottPH')?.value),tp=parseFloat(document.getElementById('prescottTP')?.value);
const creat=parseFloat(document.getElementById('prescottCreat')?.value),enceph=parseInt(document.getElementById('prescottEnceph')?.value);
const lact=parseFloat(document.getElementById('prescottLact')?.value);
const el=document.getElementById('prescottResult');if(!el)return;
let criteria=[];let transplant=false;
if(ph&&ph<7.30){criteria.push('pH < 7.30 ⚠️');transplant=true}
if(lact&&lact>3.5){criteria.push(`Lactates ${lact} mmol/L > 3.5 ⚠️`)}
if(tp&&creat&&enceph>=3){
if(tp<10||(tp<20&&creat>300)){criteria.push('TP bas + créat élevée + encéphalopathie grade ≥3');transplant=true}
}
if(enceph>=3)criteria.push('Encéphalopathie grade ≥3');
let html=`<div class="detail-section">`;
if(transplant)html+=`<p style="color:#e03131;font-weight:700;font-size:1.1rem">⚠️ CRITÈRES DE KING'S COLLEGE ATTEINTS — Transplantation à discuter</p>`;
else html+=`<p style="color:#2b8a3e;font-weight:600">Critères de King's College non atteints actuellement</p>`;
html+=`<p style="font-size:.85rem;color:var(--dim);margin-top:8px"><strong>Critères King's College (paracétamol):</strong><br>
• pH < 7.30 après remplissage (critère suffisant à lui seul)<br>
OU les 3 critères suivants ensemble:<br>
• TP < 10% (INR > 6.5) ET<br>
• Créatinine > 300 µmol/L ET<br>
• Encéphalopathie grade ≥ 3</p>`;
if(criteria.length)html+=`<div style="margin-top:12px"><strong>Critères retrouvés:</strong><br>${criteria.map(c=>`• ${c}`).join('<br>')}</div>`;
html+=`</div>`;el.innerHTML=html;
}
function calcClichy(){
const fv=parseFloat(document.getElementById('clichyFV')?.value),age=parseFloat(document.getElementById('clichyAge')?.value),enceph=document.getElementById('clichyEnceph')?.value;
const el=document.getElementById('clichyResult');if(!el)return;
if(!fv||!age){el.innerHTML='<p style="color:#e03131">Facteur V et âge requis</p>';return}
let transplant=false;
if(enceph==='oui'&&fv<20)transplant=true;
if(enceph!=='oui'&&fv<30&&age<30)transplant=true;
let html=`<div class="detail-section">`;
if(transplant)html+=`<p style="color:#e03131;font-weight:700;font-size:1.1rem">⚠️ CRITÈRES DE CLICHY ATTEINTS — Transplantation en urgence</p>`;
else html+=`<p style="color:#2b8a3e;font-weight:600">Critères de Clichy non atteints</p>`;
html+=`<p style="font-size:.85rem;color:var(--dim);margin-top:8px"><strong>Critères de Clichy-Villejuif:</strong><br>
• Encéphalopathie grade 3-4 + Facteur V < 20%<br>
OU<br>
• Âge < 30 ans + Facteur V < 30% (même sans encéphalopathie sévère)</p>`;
html+=`</div>`;el.innerHTML=html;
}
